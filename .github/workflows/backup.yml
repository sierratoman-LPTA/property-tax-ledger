name: Daily Firebase Backup

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Firebase data
        run: |
          mkdir -p backups
          curl -f -s "https://propertytaxledger-default-rtdb.firebaseio.com/ptl.json" \
            -o "backups/ptl-backup-$(date +'%Y-%m-%d_%H-%M-%S').json"

      - name: Commit and push backup
        run: |
          git config user.name "PTL Backup Bot"
          git config user.email "backup@lane-pta.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Auto backup $(date +'%Y-%m-%d')"
          git push
